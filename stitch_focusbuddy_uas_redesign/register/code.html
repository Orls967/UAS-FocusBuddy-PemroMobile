<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FocusBuddy - Join the Academic Momentum</title>
<!-- Material Symbols & Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&amp;family=Hanken+Grotesk:wght@400;500&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface-dim": "#cbdbf5",
            "inverse-surface": "#213145",
            "on-secondary-fixed-variant": "#494640",
            "background": "#f8f9ff",
            "on-tertiary-fixed": "#410004",
            "surface-container-high": "#dce9ff",
            "secondary-fixed": "#e7e2d9",
            "secondary-container": "#e7e2d9",
            "surface-bright": "#f8f9ff",
            "outline-variant": "#c3c6ce",
            "on-primary-fixed-variant": "#2a4968",
            "tertiary-container": "#701617",
            "outline": "#73777e",
            "primary": "#002542",
            "on-background": "#0b1c30",
            "on-tertiary": "#ffffff",
            "on-error": "#ffffff",
            "on-secondary": "#ffffff",
            "inverse-on-surface": "#eaf1ff",
            "surface-container": "#e5eeff",
            "on-primary": "#ffffff",
            "on-tertiary-container": "#fa7d75",
            "error-container": "#ffdad6",
            "surface-tint": "#436182",
            "on-error-container": "#93000a",
            "tertiary-fixed-dim": "#ffb3ad",
            "surface-container-highest": "#d3e4fe",
            "inverse-primary": "#abc9ef",
            "tertiary": "#500006",
            "on-surface": "#0b1c30",
            "on-primary-fixed": "#001d35",
            "surface-container-lowest": "#ffffff",
            "primary-fixed": "#d1e4ff",
            "on-secondary-container": "#67645d",
            "surface": "#f8f9ff",
            "error": "#ba1a1a",
            "on-secondary-fixed": "#1d1b16",
            "surface-container-low": "#eff4ff",
            "secondary-fixed-dim": "#cbc6bd",
            "on-surface-variant": "#43474d",
            "on-tertiary-fixed-variant": "#832423",
            "primary-fixed-dim": "#abc9ef",
            "surface-variant": "#d3e4fe",
            "on-primary-container": "#87a5ca",
            "primary-container": "#1b3b5a",
            "secondary": "#615e57",
            "tertiary-fixed": "#ffdad7"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "2xl": "20px",
            "full": "9999px"
          },
          "spacing": {
            "base": "8px",
            "margin-desktop": "64px",
            "stack-gap": "12px",
            "container-padding": "24px",
            "margin-mobile": "20px",
            "gutter": "16px"
          },
          "fontFamily": {
            "headline-lg-mobile": ["Manrope"],

            "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}],

            "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "800"}]

        },
      },
    }

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      background-color: #1b3b5a; /* Deep Navy Base per requirements */
    }
    .mesh-gradient {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    .floating-shape {
      filter: blur(80px);
      position: absolute;
      border-radius: 50%;
      opacity: 0.15;
      animation: float 20s infinite alternate ease-in-out;
    }
    @keyframes float {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(100px, 50px) scale(1.2); }
    }
    .input-focus-ring:focus-within {
      box-shadow: 0 0 0 3px rgba(209, 228, 255, 0.3);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex items-center justify-center font-body-md text-on-surface overflow-x-hidden">
<!-- Background Decorative Layer -->
<div class="mesh-gradient">
<div class="floating-shape bg-primary-fixed-dim w-[500px] h-[500px] -top-24 -left-24"></div>
<div class="floating-shape bg-secondary-fixed w-[400px] h-[400px] bottom-0 right-0" style="animation-delay: -5s;"></div>
</div>
<!-- Main Canvas -->
<main class="w-full max-w-[480px] px-margin-mobile md:px-0 py-12 relative z-10">
<!-- Branding/Header Area -->
<header class="text-center mb-10 space-y-2">
<div class="flex justify-center mb-6">
<div class="w-16 h-16 bg-surface-container-lowest rounded-2xl flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="school">school</span>
</div>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-surface-container-lowest tracking-tight">
        Create Account
      </h1>
<p class="font-body-md text-body-md text-surface-dim opacity-80">
        Unlock your academic potential with FocusBuddy.
      </p>
</header>
<!-- Registration Form Card -->
<section class="bg-surface-container-lowest/5 backdrop-blur-xl border border-white/10 rounded-2xl p-container-padding shadow-2xl">
<form class="space-y-gutter">
<!-- Name Row -->
<div class="grid grid-cols-2 gap-stack-gap">
<div class="space-y-2">
<label class="font-label-md text-label-md text-surface-dim ml-1">First Name</label>
<div class="input-focus-ring group flex items-center bg-surface-container-lowest rounded-2xl border-1.5 border-transparent transition-all">
<input class="w-full bg-transparent border-none focus:ring-0 px-4 py-3 text-primary font-body-md placeholder:text-on-surface-variant/40 outline-none" placeholder="John" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-surface-dim ml-1">Last Name</label>
<div class="input-focus-ring group flex items-center bg-surface-container-lowest rounded-2xl border-1.5 border-transparent transition-all">
<input class="w-full bg-transparent border-none focus:ring-0 px-4 py-3 text-primary font-body-md placeholder:text-on-surface-variant/40 outline-none" placeholder="Doe" type="text"/>
</div>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-surface-dim ml-1">Email Address</label>
<div class="input-focus-ring group flex items-center bg-surface-container-lowest rounded-2xl border-1.5 border-transparent transition-all">
<span class="material-symbols-outlined text-outline ml-4" data-icon="mail">mail</span>
<input class="w-full bg-transparent border-none focus:ring-0 px-3 py-3 text-primary font-body-md placeholder:text-on-surface-variant/40 outline-none" placeholder="scholar@university.edu" type="email"/>
</div>
</div>
<!-- Password Fields -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-surface-dim ml-1">Password</label>
<div class="input-focus-ring group flex items-center bg-surface-container-lowest rounded-2xl border-1.5 border-transparent transition-all">
<span class="material-symbols-outlined text-outline ml-4" data-icon="lock">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 px-3 py-3 text-primary font-body-md placeholder:text-on-surface-variant/40 outline-none" placeholder="••••••••" type="password"/>
<button class="pr-4 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-surface-dim ml-1">Confirm Password</label>
<div class="input-focus-ring group flex items-center bg-surface-container-lowest rounded-2xl border-1.5 border-transparent transition-all">
<span class="material-symbols-outlined text-outline ml-4" data-icon="verified_user">verified_user</span>
<input class="w-full bg-transparent border-none focus:ring-0 px-3 py-3 text-primary font-body-md placeholder:text-on-surface-variant/40 outline-none" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full h-14 bg-secondary-fixed hover:bg-secondary-container active:scale-95 text-on-primary-fixed font-headline-sm text-headline-sm rounded-2xl shadow-xl transition-all flex items-center justify-center gap-2 group" type="submit">
            Register
            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Footer Link -->
<p class="text-center font-body-md text-body-md text-surface-dim pt-2">
          Already have an account? 
          <a class="text-secondary-fixed font-semibold hover:underline transition-all decoration-secondary-fixed/30 underline-offset-4" href="#">Login!</a>
</p>
</form>
</section>
<!-- Side Illustration/Atmospheric Element (Mobile Hidden) -->
<div class="hidden lg:block absolute -right-64 top-1/2 -translate-y-1/2 w-48 opacity-20">
<div class="space-y-4">
<div class="h-2 w-32 bg-white rounded-full"></div>
<div class="h-2 w-48 bg-white rounded-full"></div>
<div class="h-2 w-24 bg-white rounded-full"></div>
</div>
</div>
</main>
<script>
    // Micro-interaction for input fields
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('focus', () => {
        input.parentElement.classList.add('border-primary-fixed-dim');
      });
      input.addEventListener('blur', () => {
        input.parentElement.classList.remove('border-primary-fixed-dim');
      });
    });

    // Form submission animation placeholder
    document.querySelector('form').addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      const originalContent = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
      
      setTimeout(() => {
        btn.innerHTML = originalContent;
        btn.disabled = false;
        alert('Welcome to the focus zone, Scholar!');
      }, 1500);
    });
  </script>
</body></html>
