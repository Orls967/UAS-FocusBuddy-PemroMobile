<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    
    @keyframes pulse-ring {
      0% { transform: scale(0.8); opacity: 0.5; }
      100% { transform: scale(1.2); opacity: 0; }
    }
    
    .ripple-effect::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 9999px;
      border: 2px solid #abc9ef;
      animation: pulse-ring 3s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
    }

    .fade-in-up {
      animation: fadeInUp 1s ease-out forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    body {
      background-color: #1b3b5a; /* primary-container fallback */
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="flex flex-content items-center justify-center min-h-screen overflow-hidden selection:bg-secondary-fixed selection:text-primary">
<!-- Background Decorative Ambient Shaders -->
<div class="fixed inset-0 z-0 opacity-20 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-surface-tint rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-on-primary-container rounded-full blur-[120px]"></div>
</div>
<!-- Main Canvas Container -->
<main class="relative z-10 flex flex-col items-center justify-center w-full max-w-md px-margin-mobile text-center">
<!-- Logo Section (Translating Image Design to Modern UI) -->
<div class="relative mb-stack-gap md:mb-gutter flex items-center justify-center ripple-effect fade-in-up" style="animation-delay: 0.1s;">
<div class="w-32 h-32 md:w-40 md:h-40 rounded-full bg-primary-container flex items-center justify-center border-4 border-outline-variant/20 shadow-2xl">
<!-- Minimalist Central Logo Representation -->
<div class="relative w-20 h-20 md:w-24 md:h-24 bg-secondary-container rounded-full flex items-center justify-center">
<div class="absolute -top-4 w-10 h-10 bg-secondary-container rounded-full shadow-sm"></div>
<div class="absolute -bottom-4 w-10 h-10 bg-secondary-container rounded-full shadow-sm"></div>
<div class="absolute -left-4 w-10 h-10 bg-secondary-container rounded-full shadow-sm"></div>
<div class="absolute -right-4 w-10 h-10 bg-secondary-container rounded-full shadow-sm"></div>
<span class="material-symbols-outlined text-primary text-5xl md:text-6xl" style="font-variation-settings: 'FILL' 1;">
            track_changes
          </span>
</div>
</div>
</div>
<!-- Branding Content -->
<div class="space-y-2 fade-in-up" style="animation-delay: 0.4s;">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-secondary-fixed tracking-tight">
        FocusBuddy
      </h1>
<p class="font-body-md text-body-md md:font-body-lg md:text-body-lg text-secondary-fixed-dim/80">
        Stay Focused, Stay Productive
      </p>
</div>
<!-- Loading / Progress Indicator (Jetpack Compose Style) -->
<div class="mt-margin-desktop w-full max-w-[200px] flex flex-col items-center gap-4 fade-in-up" style="animation-delay: 0.7s;">
<div class="w-full h-1.5 bg-on-primary-container/20 rounded-full overflow-hidden">
<div class="h-full bg-secondary-fixed transition-all duration-300 ease-out" id="loading-bar" style="width: 0%;"></div>
</div>
<span class="font-label-md text-label-md text-outline-variant uppercase tracking-widest opacity-60">Initializing</span>
</div>
</main>
<!-- Navigation Shell (Suppressed based on Transactional/Splash Rule) -->
<!-- No BottomNavBar or TopAppBar for this view per Design System hierarchy rules -->
<!-- Interaction & Animation Logic -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
      const bar = document.getElementById('loading-bar');
      let progress = 0;
      
      const interval = setInterval(() => {
        progress += Math.random() * 15;
        if (progress > 100) progress = 100;
        bar.style.width = `${progress}%`;
        
        if (progress === 100) {
          clearInterval(interval);
          // Potential redirect or next-state logic here
          console.log("App ready for focus session.");
        }
      }, 300);

      // Micro-interaction for logo on click
      const logo = document.querySelector('.ripple-effect');
      logo.addEventListener('click', () => {
        logo.style.transform = 'scale(0.95)';
        setTimeout(() => {
          logo.style.transform = 'scale(1)';
        }, 150);
      });
    });
  </script>
