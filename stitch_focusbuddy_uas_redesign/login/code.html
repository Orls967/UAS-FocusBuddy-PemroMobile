<script>
    document.addEventListener('DOMContentLoaded', () => {
      const inputs = document.querySelectorAll('input');
      
      inputs.forEach(input => {
        input.addEventListener('focus', () => {
          input.parentElement.parentElement.classList.add('scale-[1.02]');
        });
        
        input.addEventListener('blur', () => {
          input.parentElement.parentElement.classList.remove('scale-[1.02]');
        });
      });

      const loginBtn = document.querySelector('button[type="submit"]');
      loginBtn.addEventListener('click', (e) => {
        e.preventDefault();
        loginBtn.innerHTML = `
          <div class="w-5 h-5 border-2 border-on-primary border-t-transparent rounded-full animate-spin mr-2"></div>
          Authenticating...
        `;
        setTimeout(() => {
          loginBtn.innerHTML = `Login <span class="material-symbols-outlined text-xl">arrow_forward</span>`;
        }, 2000);
      });
    });
  </script>
